server {
    listen 80;
    server_name localhost;

    # Compress text assets — Vite does not pre-gzip; without this, JS/CSS
    # go out as raw bytes on Cloud Run and erase most of the bundle-size wins.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # Hashed Vite assets — content-addressed, safe to cache forever.
    location /assets/ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Loader WASM + animation (public/, not content-hashed — revalidate on deploy).
    location = /dotlottie-player.wasm {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        try_files $uri =404;
    }

    location = /tennis-ball.json {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        try_files $uri =404;
    }

    # Default landing is the guest tournament list.
    location = / {
        return 302 /tournaments;
    }

    # Build-time prerendered guest list (dist/tournaments/index.html).
    # Served before the SPA fallback so first paint includes real rows.
    location = /tournaments {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=60, must-revalidate";
        try_files /tournaments/index.html =404;
    }

    location = /tournaments/ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=60, must-revalidate";
        try_files /tournaments/index.html =404;
    }

    # HTML entry — always revalidate so deploys take effect immediately.
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        add_header Cache-Control "public, max-age=0, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }

    location /health {
        return 200;
    }
}
