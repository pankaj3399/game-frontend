<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" sizes="32x32" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#067429" />
    <meta name="apple-mobile-web-app-title" content="TB10" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <title>TB10</title>
    <style>
      /*
       * Critical CSS for the static boot shell below (and nothing else).
       * Must visually match AppNavbar + guest /tournaments chrome so React's
       * first commit repaints identical pixels. Full app CSS loads async.
       */
      .tb10-boot-shell { min-height: 100vh; width: 100%; background: #f8fbf8; }
      .tb10-boot-header { position: sticky; top: 0; z-index: 50; height: 56px; width: 100%; background: #067429; }
      .tb10-boot-header-inner {
        position: relative;
        margin: 0 auto;
        display: grid;
        height: 100%;
        width: 100%;
        max-width: 1440px;
        grid-template-columns: auto minmax(0, 1fr) auto;
        align-items: center;
        gap: 0 8px;
        padding: 0 12px;
      }
      .tb10-boot-logo { display: block; height: 28px; width: auto; }
      .tb10-boot-title {
        pointer-events: none;
        position: absolute;
        inset: 0;
        z-index: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 4px 3.75rem;
        margin: 0;
        min-width: 0;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        font-size: 21px;
        font-weight: 600;
        line-height: 1.15;
        color: #ffdc4a;
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .tb10-boot-nav { display: none; }
      .tb10-boot-actions { position: relative; z-index: 10; display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
      .tb10-boot-login {
        display: none;
        height: 32px;
        align-items: center;
        justify-content: center;
        gap: 7px;
        border-radius: 8px;
        background: #ffdc4a;
        padding: 0 12px;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        font-size: 13px;
        font-weight: 500;
        color: #010a04;
        text-decoration: none;
        white-space: nowrap;
      }
      .tb10-boot-menu {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 30px;
        height: 30px;
        padding: 0;
        border: 0;
        background: transparent;
        color: #fff;
      }
      .tb10-boot-menu svg { display: block; width: 30px; height: 30px; }
      .tb10-boot-lang {
        display: none;
        height: 32px;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.35);
        padding: 0 10px;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.04em;
        color: #fff;
      }
      @media (min-width: 640px) {
        .tb10-boot-title { padding-left: 5.5rem; padding-right: 5.5rem; font-size: 23px; }
      }
      @media (min-width: 768px) {
        .tb10-boot-logo { height: 33px; }
      }
      @media (min-width: 1024px) {
        .tb10-boot-header { height: 60px; }
        .tb10-boot-header-inner { padding: 0 24px; gap: 0 8px; }
        .tb10-boot-title { display: none; }
        .tb10-boot-nav {
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 10px;
          min-width: 0;
          overflow: hidden;
        }
        .tb10-boot-nav a {
          display: inline-flex;
          align-items: center;
          gap: 4px;
          font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
          font-size: 12px;
          font-weight: 500;
          line-height: 1;
          color: rgba(255, 255, 255, 0.8);
          text-decoration: none;
          white-space: nowrap;
        }
        .tb10-boot-nav a[aria-current="page"] { color: #fff; }
        .tb10-boot-menu { display: none; }
        .tb10-boot-lang { display: inline-flex; }
        .tb10-boot-login { display: inline-flex; height: 34px; padding: 0 20px; font-size: 14px; }
      }
      @media (min-width: 1280px) {
        .tb10-boot-header-inner { padding: 0 72px; gap: 0 12px; }
        .tb10-boot-logo { height: 39px; }
        .tb10-boot-nav { gap: 16px; }
        .tb10-boot-nav a { font-size: 13px; gap: 6px; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!--
        Static first-paint shell: paints the header (and optional page chrome)
        from HTML + inline critical CSS alone, before any JS or full stylesheet.
        React clears it and re-renders matching pixels on mount.
      -->
      <div class="tb10-boot-shell">
        <header class="tb10-boot-header">
          <div class="tb10-boot-header-inner">
            <a class="tb10-boot-logo-link" href="/tournaments" aria-label="TB10 Home" style="position:relative;z-index:10;display:inline-flex;align-items:center">
              <img
                class="tb10-boot-logo"
                src="__TB10_LOGO_SRC__"
                alt="TB10 v1.6"
                width="144"
                height="28"
                fetchpriority="high"
                decoding="async"
              />
            </a>
            <p class="tb10-boot-title">Tournaments</p>
            <nav class="tb10-boot-nav" aria-label="Primary">
              <a href="/tournaments" aria-current="page">Tournaments</a>
              <a href="/my-score">My Score</a>
              <a href="/record-score">Record Score</a>
              <a href="/profile">Settings</a>
              <a href="/clubs">Clubs</a>
              <a href="/sponsors">TB10 Sponsors</a>
              <a href="/about">About TB10</a>
            </nav>
            <div class="tb10-boot-actions">
              <span class="tb10-boot-lang" aria-hidden="true">EN</span>
              <a class="tb10-boot-login" href="/login">Log In</a>
              <span class="tb10-boot-menu" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
                  <path d="M4 7h16M4 12h16M4 17h16" />
                </svg>
              </span>
            </div>
          </div>
        </header>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
