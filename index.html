<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" sizes="32x32" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#067429" />
    <meta name="apple-mobile-web-app-title" content="TB10" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <title>TB10</title>
    <style>
      /*
       * Minimal first-paint shell for all SPA routes. Matches App's bg-gray-50 so
       * cold loads (e.g. /login) never flash the wrong navbar. Full navbar +
       * tournaments list chrome is injected only for GET /tournaments at build time.
       */
      .tb10-boot-shell { min-height: 100vh; width: 100%; background: #f9fafb; }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="tb10-boot-shell" aria-hidden="true"></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
